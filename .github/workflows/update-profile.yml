name: Update profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate profile SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIRTH_DATE: ${{ vars.BIRTH_DATE }}
        run: python generate_profile.py

      - name: Commit updated statistics
        run: |
          if git diff --quiet -- profile.svg; then
            echo "Profile statistics are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile.svg
          git commit -m "chore: update profile statistics"
          git push
